name: Build and Release

on:
  push:
    tags:
      - "v*" # 触发条件为推送标签时

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Version range or exact version of a Python version to use, using SemVer's version range syntax
          architecture: "x64" # optional x64 or x86. Defaults to x64 if not specified
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: login.py
          mode: app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }} Build
          path: |
            build/*.exe
            build/*.bin
            build/*.app/**/*
          include-hidden-files: true

  build-openwrt:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build for OpenWrt x86-64
        run: |
          # Create a Docker container with OpenWrt SDK
          docker run --rm -v $PWD:/src -w /src alpine:latest /bin/sh -c '
            # Install dependencies
            apk add --no-cache python3 python3-dev py3-pip py3-virtualenv gcc musl-dev linux-headers
            
            # Install OpenWrt SDK dependencies
            apk add --no-cache git build-base libc-dev ncurses-dev gawk gettext bash

            # Create and activate virtual environment
            python3 -m venv /tmp/venv
            . /tmp/venv/bin/activate

            # Install your Python dependencies
            pip install -r requirements.txt

            # Install pyinstaller for static compilation
            pip install pyinstaller
            
            # Show PyInstaller version for debugging
            pyinstaller --version
            
            # Package the application for OpenWrt x86-64
            # Use --target-architecture but not --target-platform (not supported)
            pyinstaller --onefile --target-architecture x86_64 login.py
            
            # Create dist directory if it doesn't exist
            mkdir -p dist
            
            # Check if the build was successful
            if [ -f dist/login ]; then
              # Ensure executable permissions
              chmod +x dist/login
              
              # Rename the binary for OpenWrt
              mv dist/login dist/login_openwrt_x86_64
              echo "Build successful: $(ls -la dist/)"
            else
              echo "Error: Build failed, dist/login not found"
              echo "Contents of current directory:"
              ls -la
              echo "Contents of dist directory (if exists):"
              if [ -d dist ]; then
                ls -la dist/
              else
                echo "dist/ directory does not exist"
              fi
              exit 1
            fi
          '

      - name: Upload OpenWrt Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt x86-64 Build
          path: dist/login_openwrt_x86_64
          if-no-files-found: error

  release:
    needs: [build, build-openwrt]
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          find artifacts -type f  # Better recursive listing for debugging

      - name: Package macOS App
        run: |
          cd artifacts/macOS\ Build
          zip -r login.app.zip login.app  # 将 login.app 打包成 zip 文件
          cd ../..

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Linux Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Linux Build/login.bin
          asset_name: login_linux.bin
          asset_content_type: application/octet-stream

      - name: Upload Windows Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Windows Build/login.exe
          asset_name: login_windows.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/macOS Build/login.app.zip
          asset_name: login_macos.zip
          asset_content_type: application/zip
          
      - name: Upload OpenWrt x86-64 Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/OpenWrt x86-64 Build/login_openwrt_x86_64
          asset_name: login_openwrt_x86_64
          asset_content_type: application/octet-stream
