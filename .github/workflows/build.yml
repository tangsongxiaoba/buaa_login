name: Build and Release

on:
  push:
    tags:
      - "v*" # 触发条件为推送标签时

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            arch: x64
          - os: ubuntu-20.04
            arch: x64
          - os: windows-latest
            arch: x64
          - os: ubuntu-20.04
            arch: arm64
            name: ubuntu-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch != 'arm64' && matrix.arch || 'x64' }} # For GitHub-hosted runners we can only use x64
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      # Special handling for ARM64 build
      - name: Set up QEMU (for ARM64)
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build ARM64 Executable in Docker
        if: matrix.arch == 'arm64'
        run: |
          docker run --rm --platform linux/arm64 -v ${{ github.workspace }}:/app -w /app arm64v8/python:3.12-slim bash -c "
            pip install -r requirements.txt
            pip install nuitka
            apt install patchelf
            python -m nuitka --standalone --follow-imports login.py
          "
          mkdir -p build
          mv login.dist/login.bin build/login.bin || mv login.dist/login build/login.bin

      - name: Build Executable (x64)
        if: matrix.arch != 'arm64'
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: login.py
          mode: app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name || runner.os }} Build
          path: |
            build/*.exe
            build/*.bin
            build/*.app/**/*
          include-hidden-files: true

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          ls -R artifacts  # 列出 artifacts 目录的内容，用于调试

      - name: Package macOS App
        run: |
          cd artifacts/macOS\ Build
          zip -r login.app.zip login.app  # 将 login.app 打包成 zip 文件
          cd ../..

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      - name: Upload Linux x64 Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Linux Build/login.bin
          asset_name: login_linux_x64.bin
          asset_content_type: application/octet-stream

      - name: Upload Linux ARM64 Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/ubuntu-arm64 Build/login.bin
          asset_name: login_linux_arm64.bin
          asset_content_type: application/octet-stream

      - name: Upload Windows Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/Windows Build/login.exe
          asset_name: login_windows.exe
          asset_content_type: application/octet-stream

      - name: Upload macOS Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/macOS Build/login.app.zip
          asset_name: login_macos.zip
          asset_content_type: application/zip