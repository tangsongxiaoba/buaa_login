name: Build and Release

on:
  push:
    tags:
      - "v*" # 触发条件为推送标签时

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-20.04, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" # Version range or exact version of a Python version to use, using SemVer's version range syntax
          architecture: "x64" # optional x64 or x86. Defaults to x64 if not specified
          cache: "pip"
          cache-dependency-path: |
            **/requirements*.txt

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Build Executable
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: login.py
          mode: app

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ runner.os }} Build
          path: |
            build/*.exe
            build/*.bin
            build/*.app/**/*
          include-hidden-files: true

  build-openwrt:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build for OpenWrt x86-64
        run: |
          # Create a Docker container with OpenWrt SDK
          docker run --rm -v $PWD:/src -w /src alpine:latest /bin/sh -c '
            # Install dependencies
            apk add --no-cache python3 py3-pip gcc musl-dev linux-headers
            
            # Install OpenWrt SDK dependencies
            apk add --no-cache git build-base libc-dev ncurses-dev gawk gettext bash

            # Install your Python dependencies
            pip3 install -r requirements.txt

            # Install pyinstaller for static compilation
            pip3 install pyinstaller
            
            # Package the application for OpenWrt x86-64
            pyinstaller --onefile --target-architecture x86_64 --target-platform linux login.py
            
            # Ensure executable permissions
            chmod +x dist/login
          '
          
          # Rename the binary for OpenWrt
          mv dist/login dist/login_openwrt_x86_64

      - name: Upload OpenWrt Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt x86-64 Build
          path: dist/login_openwrt_x86_64
          include-hidden-files: true

  release:
    needs: [build, build-openwrt]
    runs-on: ubuntu-latest
    steps:
      # Your existing download artifact steps...
      
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Artifacts
        run: |
          ls -R artifacts  # List artifacts directory content for debugging

      # Your existing packaging steps...
      
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false

      # Your existing upload steps...
      
      - name: Upload OpenWrt x86-64 Build
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: artifacts/OpenWrt x86-64 Build/login_openwrt_x86_64
          asset_name: login_openwrt_x86_64
          asset_content_type: application/octet-stream